[build]
  base = "client"
  command = "npm run build"
  publish = "dist"
  functions = "../netlify/functions"

[dev]
  command = "npm run dev"
  port = 5173

# Redirect /api/* calls to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback – let React Router handle all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
